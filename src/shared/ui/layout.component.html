<div class="flex h-screen bg-gray-50 dark:bg-gray-900">
  <!-- Sidebar -->
  <app-sidebar [menuItems]="menuItems()" [isMobileMenuOpen]="isMobileMenuOpen()" />
  
  <!-- Main Content -->
  <div class="flex-1 lg:ml-64">
    <!-- Top Bar -->
    <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <!-- Mobile menu button -->
          <button 
            class="lg:hidden p-2 rounded-md text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700"
            (click)="toggleMobileMenu()"
          >
            <span class="text-xl">☰</span>
          </button>
        </div>
        
        <div class="flex items-center space-x-4">
          <!-- Empty space for future icons if needed -->
        </div>
      </div>
    </header>
    
    <!-- Page Content -->
    <main class="p-6 bg-gray-50 dark:bg-gray-900 min-h-screen">
      <ng-content></ng-content>
    </main>
  </div>
</div>
